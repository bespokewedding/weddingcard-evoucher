            background-color: #FFFDD0; 
            background-size: cover;
            background-position: center;
            overflow: hidden;

        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }
        .font-lora { font-family: 'Lora', serif; }

        .text-layer { color: #8B4513; }

        .date-container-new {

            width: 41%;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Lora', serif;
        }

        .date-row-bottom {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            text-align: center;
        }
        .date-side {
            font-size: 2.8cqw;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .date-main {
            font-size: 7.2cqw;
            font-weight: 500;
            line-height: 1;
            padding: 0 2cqw;
        }

        .week-container-under {
            position: absolute;
            top: 79%; 
            left: 4.5%;
            width: 41%;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Lora', serif;
            z-index: 15;
        }
        
        .date-row-top-svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }
        .date-row-top-svg text {
            font-family: 'Lora', serif;
            font-size: 6px; 
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }

        .venue-layer { 
            position: absolute; 
            top: 75%; 
            left: 5.5%; 
            width: 39%; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 2.2cqw; 
            font-weight: 700;
            font-family: 'Lora', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
        }
        #pVenue {
            display: inline-block;
            white-space: nowrap;
        }

        .address-layer { 
            position: absolute; 
            top: 79%; 
            left: 2%; 
            width: 46%; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 1.3cqw; 
            line-height: 1.2; 
            font-family: 'Lora', serif;
        }

        /* 產品詳情面板 */
        .info-panel {
            position: absolute; top: 5%; right: 5%; width: 40cqw; height: 64cqw;
            background: rgba(255, 255, 255, 0.69); padding: 1.5cqw; border-radius: 2cqw;
            z-index: 20; backdrop-filter: blur(8px); display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1); gap: 0;
        }

        .brand-logo-wrap { flex: 0 0 24%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #pDetailBrandImg { max-width: 60%; max-height: 85%; object-fit: contain; }

        .qrcode-section { flex: 0 0 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qrcode-img { width: 8cqw; height: 8cqw; background: #000; display: flex; align-items: center; justify-content: center; }
        .expiry-date { opacity: 0.7; font-size: 0.7cqw; font-family: sans-serif; margin-top: 0.2cqw; }

        .prod-name-wrap { flex: 0 0 10%; display: flex; align-items: center; justify-content: center; text-align: center; }
        #pDetailProdName { font-weight: bold; line-height: 1.1; font-size: 3cqw; }

        .tc-wrap { flex: 0 0 35%; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        #pDetailTC { opacity: 0.8; line-height: 1.1; word-break: break-all; white-space: pre-wrap; text-align: left; width: 100%; }

        .footer-logos { flex: 0 0 11%; border-top: 1px solid rgba(139, 69, 19, 0.15); display: flex; justify-content: space-around; align-items: center; }
        .footer-logos img { height: 70%; object-fit: contain; width: 33.33%; }

        .panel-content-hidden { opacity: 0; transition: opacity 0.3s ease; }

        @media (min-width: 1280px) {

        }

            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;

        let qrcode;
        function initQR() {
            qrcode = new QRCode(document.getElementById("qrcode"), {
                text: "https://www.bespoke-mall.com/weddingcard-evoucher.html",
                width: 128,
                height: 128,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function changeBG(filename, label) {
            const canvas = document.getElementById('previewCanvas');
            canvas.style.backgroundImage = `url('./bg${filename}.jpg?v=20260429_v4')`;
            
            // 文字顏色處理
            const textLayers = [
                document.getElementById('pBride'),
                document.getElementById('pGroom'),
                document.querySelector('.date-container-new'),
                document.querySelector('.week-container-under'),
                document.querySelector('.venue-layer'),
                document.querySelector('.address-layer')
            ];
            const svgText = document.querySelector('.date-row-top-svg textPath');

            let targetColor = '#8B4513'; // 預設顏色
            if (label === 'D') targetColor = '#ffffff';
            else if (label === 'F') targetColor = '#333062';

            textLayers.forEach(el => { if(el) el.style.color = targetColor; });
            if(svgText) svgText.style.fill = targetColor;

            document.querySelectorAll('.bg-option').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-bg') === filename) {
                    btn.classList.add('active');
                }
            });
        }

        function mainSwitch(target) {
            const editorSec = document.getElementById('section-editor');
            const brandsSec = document.getElementById('section-brands');
            const tabEditor = document.getElementById('main-tab-editor');
            const tabBrands = document.getElementById('main-tab-brands');
            if (target === 'editor') {
                editorSec.classList.replace('hidden', 'block');
                brandsSec.classList.replace('block', 'hidden');
                tabEditor.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-900 border-r bg-[#F4F4F5]";
                tabBrands.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-500 hover:text-zinc-900 bg-transparent";
            } else {
                brandsSec.classList.replace('hidden', 'block');
                editorSec.classList.replace('block', 'hidden');
                tabBrands.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-900 border-l bg-[#F4F4F5]";
                tabEditor.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-500 hover:text-zinc-900 bg-transparent";
                renderBrands();
            }
        }

        function renderBrands() {
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = '';
            allBrands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = "aspect-square border-2 border-zinc-300 bg-[#E4E4E7] p-2 hover:bg-white hover:border-zinc-900 rounded-xl transition-all flex items-center justify-center overflow-hidden shadow-sm";
                btn.onclick = () => showProducts(brand.name, brand.img);
                btn.innerHTML = `<img src="${brand.img}" class="max-h-full max-w-full object-contain">`;
                grid.appendChild(btn);
            });
        }

        function showProducts(bName, bImg) {
            const section = document.getElementById('productSection');
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('selectedBrandTitle');
            section.classList.remove('hidden');
            title.innerText = `${bName} 產品選擇`;
            grid.innerHTML = '';
            defaultProducts.filter(p => p.brandName === bName).forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 border border-zinc-300 bg-white rounded-xl hover:bg-zinc-900 hover:text-white text-xs font-bold transition-all shadow-sm mb-1";
                btn.innerText = p.product;
                btn.onclick = () => applySelection(bImg, p.product, p.tc);
                grid.appendChild(btn);
            });
        }

        function applySelection(img, name, tc) {
            document.querySelectorAll('.panel-content-hidden').forEach(el => el.style.opacity = '1');
            document.getElementById('pDetailBrandImg').src = img;
            document.getElementById('pDetailProdName').innerText = name;
            const tcEl = document.getElementById('pDetailTC');
            tcEl.innerText = tc;
            setTimeout(() => { autoScaleText(tcEl, 0.9, 0.4); }, 10);
        }

        function autoScaleText(element, maxFontSize, minFontSize) {
            const parent = element.parentElement;
            let fontSizeCqw = maxFontSize;
            element.style.fontSize = fontSizeCqw + 'cqw';
            while (element.scrollHeight > parent.offsetHeight && fontSizeCqw > minFontSize) {
                fontSizeCqw -= 0.05;
                element.style.fontSize = fontSizeCqw + 'cqw';
            }
        }

        function autoScaleVenue() {
            const element = document.getElementById('pVenue');
            const parent = element.parentElement;
            let fontSizeCqw = 2.2;
            element.style.fontSize = fontSizeCqw + 'cqw';
            while (element.offsetWidth > parent.offsetWidth && fontSizeCqw > 0.8) {
                fontSizeCqw -= 0.05;
                element.style.fontSize = fontSizeCqw + 'cqw';
            }
        }

        const sync = () => {
            const brideInput = document.getElementById('iBride');
            const groomInput = document.getElementById('iGroom');
            const dateInput = document.getElementById('iDate');
            const venueInput = document.getElementById('iVenue');
            const addressInput = document.getElementById('iAddress');

            if (brideInput) document.getElementById('pBride').innerText = brideInput.value;
            if (groomInput) document.getElementById('pGroom').innerText = groomInput.value;
            
            if (dateInput && dateInput.value) {
                const dateObj = new Date(dateInput.value);
                const dayOfWeek = dateObj.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
                const month = dateObj.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
                const day = dateObj.getDate();
                const year = dateObj.getFullYear();

                document.getElementById('pDayOfWeek').textContent = dayOfWeek;
                document.getElementById('pMonth').innerText = month;
                document.getElementById('pDay').innerText = day;
                document.getElementById('pYear').innerText = year;
            }
            if (venueInput) {
                document.getElementById('pVenue').innerText = venueInput.value;
                autoScaleVenue();
            }
            if (addressInput) document.getElementById('pAddress').innerText = addressInput.value;
        };

        ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', sync);
        });

        window.onload = () => {
            sync();
            autoScaleVenue();
            initQR();
        };
    </script>
