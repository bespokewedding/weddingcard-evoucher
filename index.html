<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESPOKE 囍帖預覽器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        /* 核心畫布設定 - 路徑已改為 bg4.jpg */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('bg4.jpg?v=20260429_v4'); 
            background-color: #FFFDD0; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            container-type: inline-size;
        }

        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }

        /* 文字圖層 - 中咖色 #8B4513 */
        .bride-layer { position: absolute; top: 24%; left: 0; width: 50%; color: #8B4513; z-index: 10; display: flex; justify-content: center; transform: translateX(-3.2cqw); }
        .groom-layer { position: absolute; top: 43.5%; left: 0; width: 50%; color: #8B4513; z-index: 10; display: flex; justify-content: center; transform: translateX(8.2cqw); }
        .name-wrap { width: 80%; text-align: center; }
        #pBride, #pGroom { font-size: 4.5cqw; line-height: 1; white-space: nowrap; display: inline-block; }
        .date-layer { position: absolute; top: 64%; left: 9%; width: 32%; text-align: center; color: #8B4513; font-size: 2cqw; letter-spacing: 0.25em; }
        .venue-layer { position: absolute; top: 72%; left: 5.5%; width: 39%; text-align: center; color: #8B4513; text-transform: uppercase; font-size: 1.6cqw; }
        .address-layer { position: absolute; top: 77%; left: 2%; width: 46%; text-align: center; color: #8B4513; text-transform: uppercase; font-size: 1.6cqw; line-height: 1.2; }

        /* 產品詳情面板 */
        .info-panel {
            position: absolute; top: 5%; right: 5%; width: 40cqw; height: 64cqw;
            background: rgba(255,255,255,0.12); padding: 1.5cqw; border-radius: 2cqw;
            z-index: 20; backdrop-filter: blur(8px); display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1); gap: 0;
        }

        .brand-logo-wrap { flex: 0 0 40%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #pDetailBrandImg { max-width: 90%; max-height: 85%; object-fit: contain; }

        /* 產品名稱顏色：橙色 */
        .prod-name-wrap { flex: 0 0 20%; display: flex; align-items: center; justify-content: center; text-align: center; }
        #pDetailProdName { font-weight: bold; color: #8B4513; line-height: 1.1; font-size: 4.2cqw; text-shadow: 0 2px 5px rgba(0,0,0,0.4); }

        .tc-wrap { flex: 0 0 30%; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        #pDetailTC { color: #8B4513; opacity: 0.8; line-height: 1.1; word-break: break-all; white-space: pre-wrap; text-align: left; width: 100%; }

        .barcode-wrap { flex: 0 0 10%; border-top: 1px solid rgba(139, 69, 19, 0.15); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .barcode-img { width: 70%; height: 2cqw; background: linear-gradient(90deg, #000 5%, transparent 5%, transparent 8%, #000 8%, #000 12%, transparent 12%, #000 15%, #000 16%, transparent 16%, #000 20%, transparent 20%, transparent 25%, #000 25%, #000 28%, transparent 28%, #000 35%, #000 37%, transparent 37%, #000 45%, transparent 45%, transparent 48%, #000 48%, #000 55%, transparent 55%, #000 60%, #000 62%, transparent 62%, #000 70%, transparent 70%, transparent 75%, #000 75%, #000 85%, transparent 85%, #000 90%, #000 95%, transparent 95%); background-color: #fff; border-radius: 1px; }
        .barcode-num { color: #8B4513; font-size: 0.7cqw; font-family: monospace; letter-spacing: 0.1em; margin-top: 0.1cqw; }
        .expiry-date { color: #8B4513; opacity: 0.7; font-size: 0.7cqw; font-family: sans-serif; }

        .panel-content-hidden { opacity: 0; transition: opacity 0.3s ease; }

        @media (min-width: 1280px) {
            .control-panel-scroll { max-height: 90vh; overflow-y: auto; }
            .control-panel-scroll::-webkit-scrollbar { width: 6px; }
            .control-panel-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        }
    </style>
</head>

        function mainSwitch(target) {
            const editorSec = document.getElementById('section-editor');
            const brandsSec = document.getElementById('section-brands');
            const tabEditor = document.getElementById('main-tab-editor');
            const tabBrands = document.getElementById('main-tab-brands');
            if (target === 'editor') {
                editorSec.classList.replace('hidden', 'block');
                brandsSec.classList.replace('block', 'hidden');
                tabEditor.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-900 border-r bg-[#F4F4F5]";
                tabBrands.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-500 hover:text-zinc-900 bg-transparent";
            } else {
                brandsSec.classList.replace('hidden', 'block');
                editorSec.classList.replace('block', 'hidden');
                tabBrands.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-900 border-l bg-[#F4F4F5]";
                tabEditor.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-500 hover:text-zinc-900 bg-transparent";
                renderBrands();
            }
        }

        function renderBrands() {
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = '';
            allBrands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = "aspect-square border-2 border-zinc-300 bg-[#E4E4E7] p-2 hover:bg-white hover:border-zinc-900 rounded-xl transition-all flex items-center justify-center overflow-hidden shadow-sm";
                btn.onclick = () => showProducts(brand.name, brand.img);
                btn.innerHTML = `<img src="${brand.img}" class="max-h-full max-w-full object-contain">`;
                grid.appendChild(btn);
            });
        }

        function showProducts(bName, bImg) {
            const section = document.getElementById('productSection');
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('selectedBrandTitle');
            section.classList.remove('hidden');
            title.innerText = `${bName} 產品選擇`;
            grid.innerHTML = '';
            defaultProducts.filter(p => p.brandName === bName).forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 border border-zinc-300 bg-white rounded-xl hover:bg-zinc-900 hover:text-white text-xs font-bold transition-all shadow-sm mb-1";
                btn.innerText = p.product;
                btn.onclick = () => applySelection(bImg, p.product, p.tc);
                grid.appendChild(btn);
            });
        }

        function applySelection(img, name, tc) {
            document.querySelectorAll('.panel-content-hidden').forEach(el => el.style.opacity = '1');
            document.getElementById('pDetailBrandImg').src = img;
            document.getElementById('pDetailProdName').innerText = name;
            const tcEl = document.getElementById('pDetailTC');
            tcEl.innerText = tc;
            setTimeout(() => { autoScaleText(tcEl, 1.1, 0.4); }, 10);
        }

        function autoScaleText(element, maxFontSize, minFontSize) {
            const parent = element.parentElement;
            let fontSizeCqw = maxFontSize;
            element.style.fontSize = fontSizeCqw + 'cqw';
            while (element.scrollHeight > parent.offsetHeight && fontSizeCqw > minFontSize) {
                fontSizeCqw -= 0.05;
                element.style.fontSize = fontSizeCqw + 'cqw';
            }
        }

        const sync = () => {
            const brideInput = document.getElementById('iBride');
            const groomInput = document.getElementById('iGroom');
            const dateInput = document.getElementById('iDate');
            const venueInput = document.getElementById('iVenue');
            const addressInput = document.getElementById('iAddress');

            if (brideInput) document.getElementById('pBride').innerText = brideInput.value;
            if (groomInput) document.getElementById('pGroom').innerText = groomInput.value;
            
            if (dateInput && dateInput.value) {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('pDate').innerText = new Date(dateInput.value).toLocaleDateString('en-US', options);
            }
            if (venueInput) document.getElementById('pVenue').innerText = venueInput.value;
            if (addressInput) document.getElementById('pAddress').innerText = addressInput.value;
        };

        ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', sync);
        });

        window.onload = sync;
    </script>
